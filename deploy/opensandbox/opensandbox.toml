## 完整配置： https://github.com/alibaba/OpenSandbox/blob/main/server/configuration.md

[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"
api_key = "deepdataagent-internal-key"

[runtime]
type = "docker"
execd_image = "opensandbox/execd:v1.0.6"

[docker]
network_mode = "bridge"
host_ip = "host.docker.internal"
drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
no_new_privileges = true
pids_limit = 512

