spring:
  application:
    name: deepdataagent-backend

server:
  port: ${SERVER_PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

app:
  sqlite:
    path: ${APP_SQLITE_PATH:./data/sqlite/deepdataagent.db}
  opensandbox:
    protocol: ${OPEN_SANDBOX_PROTOCOL:http}
    domain: ${OPEN_SANDBOX_DOMAIN:opensandbox:8080}
    api-key: ${OPEN_SANDBOX_API_KEY:deepdataagent-internal-key}
    use-server-proxy: ${OPEN_SANDBOX_USE_SERVER_PROXY:true}
    default-image: ${OPEN_SANDBOX_DEFAULT_IMAGE:opensandbox/code-interpreter:latest}
    default-timeout-seconds: ${OPEN_SANDBOX_DEFAULT_TIMEOUT_SECONDS:1800}
